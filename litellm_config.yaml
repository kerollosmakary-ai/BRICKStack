# ════════════════════════════════════════════════════════════════════
#  LiteLLM Configuration for BRICKStack
#  One config, all providers. Switch without changing code.
# ════════════════════════════════════════════════════════════════════

model_list:
  # ── Local Models (Ollama / llama.cpp) ───────────────────────
  - model_name: local-qwen-3b
    litellm_params:
      model: ollama/qwen2.5-coder:3b
      api_base: http://localhost:11434
      timeout: 120

  - model_name: local-llama-8b
    litellm_params:
      model: ollama/llama3.2
      api_base: http://localhost:11434
      timeout: 120

  - model_name: local-phi-3
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://localhost:11434
      timeout: 120

  # ── Cloud Providers (API Keys needed) ────────────────────────
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
      timeout: 60

  - model_name: deepseek-coder
    litellm_params:
      model: deepseek/deepseek-coder
      api_key: os.environ/DEEPSEEK_API_KEY
      timeout: 60

  - model_name: qwen-coder-32b
    litellm_params:
      model: openai/qwen2.5-coder-32b-instruct
      api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key: os.environ/QWEN_API_KEY
      timeout: 60

  - model_name: openai-gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      timeout: 60

  - model_name: openai-gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
      timeout: 60

  - model_name: anthropic-claude-3-5
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20240620
      api_key: os.environ/ANTHROPIC_API_KEY
      timeout: 60

  - model_name: groq-llama-3-1
    litellm_params:
      model: groq/llama-3.1-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      timeout: 30

  - model_name: groq-mixtral
    litellm_params:
      model: groq/mixtral-8x7b-32768
      api_key: os.environ/GROQ_API_KEY
      timeout: 30

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GEMINI_API_KEY
      timeout: 60

# ── Router Settings ───────────────────────────────────────────
router_settings:
  # Fallback: if primary fails, try backup
  fallback:
    - model_name: deepseek-chat
      fallback: [local-qwen-3b, openai-gpt-4o-mini]
    - model_name: qwen-coder-32b
      fallback: [deepseek-coder, local-qwen-3b]

  # Rate limits (requests per minute)
  rate_limits:
    - model: deepseek-chat
      tpm: 10000
      rpm: 60
    - model: qwen-coder-32b
      tpm: 5000
      rpm: 30
    - model: groq-llama-3-1
      tpm: 30000
      rpm: 100

  # Retry failed requests
  num_retries: 3
  retry_after: 1
  cooldown_time: 30

# ── General Settings ──────────────────────────────────────────
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  proxy_batch_write_at: 60
  database_url: os.environ/DATABASE_URL
  store_model_in_db: True

  # Cost tracking
  enable_callbacks: True
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

  # UI
  ui_username: os.environ/LITELLM_UI_USERNAME
  ui_password: os.environ/LITELLM_UI_PASSWORD

# ── Logging ───────────────────────────────────────────────────
litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  service_callback: ["prometheus"]

  # Turn off if you don't want logging
  suppress_debug_info: False
  set_verbose: False
