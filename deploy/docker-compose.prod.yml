version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brickstack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
      POSTGRES_DB: ${POSTGRES_DB:-brickstack}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - brickstack_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brickstack"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_in_env}
    volumes:
      - redis_data:/data
    networks:
      - brickstack_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - ENV=production
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-brickstack}:${POSTGRES_PASSWORD:-change_me_in_env}@postgres/${POSTGRES_DB:-brickstack}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-change_me_in_env}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - WS_REQUIRE_AUTH=${WS_REQUIRE_AUTH:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://your-domain.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../frontend:/app/frontend:ro
      - sandbox_workspace:/tmp/brickstack_workspace
    networks:
      - brickstack_net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 256M

  telegram-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    command: python3 telegram_bot.py
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BRICKSTACK_WS_URL=ws://backend:8000/ws
    depends_on:
      - backend
    networks:
      - brickstack_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - brickstack_net

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
    networks:
      - brickstack_net

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  certbot_www:
  sandbox_workspace:

networks:
  brickstack_net:
    driver: bridge
